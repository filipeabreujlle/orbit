<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Orbit</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <header>
            <h1 id="saudacao">Bom dia.</h1>

            <p id="mensagem-dia">
                Pequenos avanços contam.
            </p>
        </header>

        <section class="input-area">
            <input type="text" id="nova-tarefa" placeholder="Por onde quer começar hoje?">
        </section>

        <section class="filtros">

            <button id="filtro-todas" onclick="mudarFiltro('todas')">
                Todas
            </button>

            <button id="filtro-pendentes" onclick="mudarFiltro('pendentes')">
                Pendentes
            </button>

            <button id="filtro-concluidas" onclick="mudarFiltro('concluidas')">
                Concluídas
            </button>

        </section>

        <p id="contador-tarefas"></p>

        <ul id="lista-tarefas"></ul>

    </div>

    <script src="script.js"></script>

</body>

</html>
