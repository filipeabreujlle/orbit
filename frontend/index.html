<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Orbit</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <header>
            <h1>Orbit</h1>
            <h2 id="data-atual"></h2>
        </header>

        <section class="input-area">
            <input type="text" id="nova-tarefa" placeholder="Nova tarefa">
            <button onclick="adicionarTarefa()">Adicionar</button>
        </section>

        <section class="filtros">

            <button id="filtro-todas" onclick="mudarFiltro('todas')">
                Todas
            </button>

            <button id="filtro-pendentes" onclick="mudarFiltro('pendentes')">
                Pendentes
            </button>

            <button id="filtro-concluidas" onclick="mudarFiltro('concluidas')">
                Concluídas
            </button>

        </section>

        <p id="contador-tarefas"></p>

        <ul id="lista-tarefas"></ul>

    </div>

    <script src="script.js"></script>

</body>

</html>
